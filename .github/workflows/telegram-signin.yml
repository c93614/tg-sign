name: Telegram Daily Sign-in

on:
  schedule:
    - cron: '30 8 * * *'
  workflow_dispatch:

jobs:
  signin:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      # - uses: cli/cli-action@v2

      # - name: Wait
      #   uses: 1itachi/sleep-random@v1.0.0
      #   with:
      #     minutes: '5'
      #     random: 'true'

      - name: Download artifact
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
           name: session
      
      # - name: Try download artifact
      #   run: |
      #     if gh run download --name session 2>/dev/null; then
      #       echo "download ok"
      #     else
      #       echo "no artifact, skip"
      #     fi
    
      - name: Setup tmate session
        env:
          TELEGRAM_API_ID: ${{ secrets.TELEGRAM_API_ID }}
          TELEGRAM_API_HASH: ${{ secrets.TELEGRAM_API_HASH }}
          TELEGRAM_TO: ${{ vars.TELEGRAM_TO }}
          TELEGRAM_MESSAGE: ${{ vars.TELEGRAM_MESSAGE }}
        uses: mxschmitt/action-tmate@v3
        # timeout-minutes: 30

      - name: Set up python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install python packages
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run the script
        env:
          TELEGRAM_API_ID: ${{ secrets.TELEGRAM_API_ID }}
          TELEGRAM_API_HASH: ${{ secrets.TELEGRAM_API_HASH }}
          TELEGRAM_TO: ${{ vars.TELEGRAM_TO }}
          TELEGRAM_MESSAGE: ${{ vars.TELEGRAM_MESSAGE }}
        run: python main.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: session
          path: session.session
